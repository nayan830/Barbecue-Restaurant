<script>

/* ===============================
   CART SYSTEM
================================*/
let cart=[];

const cartCont = document.getElementById('cart-list-container');
const cartSum  = document.getElementById('cart-summary');
const subSpan  = document.getElementById('subtotal-amount');
const delSpan  = document.getElementById('delivery-amount');
const totSpan  = document.getElementById('total-amount');

function renderCart() {

  if(!cart.length){
    cartCont.innerHTML='<div class="empty-cart-message">🛒 Your cart is empty.</div>';
    cartSum.style.display='none';
    return;
  }

  let html='',sub=0;

  cart.forEach((item,i)=>{
    sub+=item.price;

    html+=`
    <div class="cart-item">

      <span class="cart-item-name">${item.name}</span>

      <span class="cart-item-price">₹${item.price}</span>

      <button class="remove-item-btn" onclick="removeFromCart(${i})">
      Remove
      </button>

    </div>
    `;

  });

  cartCont.innerHTML=html;

  subSpan.innerText=`₹${sub}`;
  delSpan.innerText='₹20';
  totSpan.innerText=`₹${sub+20}`;

  cartSum.style.display='block';
}

function removeFromCart(i){
  cart.splice(i,1);
  renderCart();
}

function addToCart(name,price){

  cart.push({name,price});

  renderCart();

  document.getElementById('order-now')
  .scrollIntoView({behavior:'smooth'});
}


/* =================================
   LOAD MENU FROM data.json
=================================*/

async function loadMenu(){

  try{

    const response = await fetch("data.json");

    const data = await response.json();

    const container =
    document.getElementById("menu-grid-container");

    let html="";

    data.menu.forEach(category=>{

      html += `
      <div class="category-header">
      ${category.category}
      </div>
      `;

      category.items.forEach(item=>{

        html += `

        <div class="food-card">

          <div class="food-img">
            <img src="${item.image}" alt="${item.name}">
          </div>

          <div class="food-info">

            <div class="food-name">
            ${item.name}
            </div>

            <div class="food-price">
            ₹${item.price}
            </div>

            <button class="add-to-cart-btn"
            onclick="addToCart('${item.name}',${item.price})">

            Add to Cart

            </button>

          </div>

        </div>

        `;

      });

    });

    container.innerHTML = html;

  }

  catch(error){

    console.error("Menu loading error:",error);

  }

}

loadMenu();



/* =================================
   WHATSAPP ORDER
=================================*/

function sendWhatsAppOrder(){

  const name=document.getElementById('name').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const address=document.getElementById('address').value.trim();

  if(!name||!phone||!address)
  return alert('Please fill all fields');

  if(!cart.length)
  return alert('Cart is empty');

  let list='';
  let sub=0;

  cart.forEach((item,i)=>{
    list+=`${i+1}. ${item.name} - ₹${item.price}\n`;
    sub+=item.price;
  });

  const msg=
  `New Food Order%0A%0A
Name: ${encodeURIComponent(name)}
Phone: ${encodeURIComponent(phone)}
Address: ${encodeURIComponent(address)}

${encodeURIComponent(list)}

Subtotal: ₹${sub}
Delivery: ₹20
Total: ₹${sub+20}`;

  window.open(
  `https://wa.me/917908461601?text=${msg}`,
  '_blank'
  );
}

</script>
