<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbeque Restaurant</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f7f3ed;
margin:0;
padding:0;
}

header{
background:#3c2a1f;
color:white;
padding:20px;
text-align:center;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.category-title{
grid-column:1/-1;
font-size:24px;
font-weight:bold;
margin-top:30px;
border-bottom:2px solid #d2691e;
padding-bottom:5px;
}

.food-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.food-card img{
width:100%;
height:150px;
object-fit:cover;
}

.food-info{
padding:15px;
}

.food-name{
font-weight:bold;
margin-bottom:5px;
}

.food-price{
color:#d2691e;
font-weight:bold;
margin-bottom:10px;
}

.add-btn{
background:#d2691e;
color:white;
border:none;
padding:8px 15px;
cursor:pointer;
border-radius:5px;
}

.add-btn:hover{
background:#a94e12;
}

</style>
</head>

<body>

<header>
<h1>🔥 BARBEQUE RESTAURANT</h1>
<p>Fast Food Restaurant</p>
</header>

<div id="menu-grid-container" class="menu-grid"></div>

<script>

/* =============================
   LOAD MENU FROM JSON
=============================*/

async function loadMenu(){

const response = await fetch("data.json");

const data = await response.json();

const container = document.getElementById("menu-grid-container");

let html = "";

data.menu.forEach(category => {

html += `<div class="category-title">${category.category}</div>`;

category.items.forEach(item => {

html += `
<div class="food-card">

<img src="${item.image}" alt="${item.name}">

<div class="food-info">

<div class="food-name">${item.name}</div>

<div class="food-price">₹${item.price}</div>

<button class="add-btn"
onclick="addToCart('${item.name}',${item.price})">
Add to Cart
</button>

</div>

</div>
`;

});

});

container.innerHTML = html;

}

loadMenu();



/* =============================
   SIMPLE CART
=============================*/

let cart=[];

function addToCart(name,price){

cart.push({name,price});

alert(name+" added to cart");

console.log(cart);

}

</script>

</body>
</html>
